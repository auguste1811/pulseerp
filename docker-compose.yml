services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulseerp
      POSTGRES_PASSWORD: pulseerp
      POSTGRES_DB: pulseerp
    ports:
      - "5432:5432"
    volumes:
      - pulseerp_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseerp -d pulseerp"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pulseerp_data:
